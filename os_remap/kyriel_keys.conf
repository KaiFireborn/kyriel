# keyd config for Kyriel keyboard
# Source: kyriel_remaps.txt

[altgr]

l = ↑
k = ↓
j = ←
semicolon = →
bracketleft = ⇐
bracketright = ⇒
u = ü
a = ä
o = ö
s = ß
c = ā
1 = ↵
2 = €
3 = °
4 = Δ
5 = ∞
6 = ·
7 = ✓
8 = ✕
9 = μ
0 = ⌀
n = ¬
slash = ⇔
apostrophe = ∧
grave = ↯
minus = −
equal = ≠
comma = ≤
period = ≥
backslash = ≈

