# keyd config for Kyriel keyboard
# Source: kyriel_remaps.txt

[altgr]

l = ↑
k = ↓
j = ←
semicolon = →
bracketleft = ⇐
bracketright = ⇒
u = ü
a = ä
o = ö
s = ß
c = ā
x = ≈
1 = ↵
2 = €
3 = °
4 = Δ
5 = ∞
6 = ·
7 = ✓
8 = ✕
9 = μ
0 = ⌀
n = ¬
slash = ⇔
apostrophe = ∧
backslash = ∨
grave = ↯
minus = −
equal = ≠
comma = ≤
period = ≥

[shift]

n = ∨
backslash = ±

[altgr+shift]

a = Ä
u = Ü
o = Ö
c = Ā

# BRIGHTNESS CONTROL
# F18 -> Shift+Alt+Up (center monitor brightness up)
# F19 -> Shift+Alt+Down (center monitor brightness down)
