# keyd config for Kyriel keyboard
# Maps special characters and brightness controls

[altgr]

# Number row - special symbols
1 = ↵
2 = €
3 = °
4 = Δ
5 = ∞
6 = ·
7 = ✓
8 = ✕
9 = μ
0 = ⌀

# Letters
u = ü
n = ¬
a = ä
s = ß
o = ö
c = ā

# Punctuation/Symbols
comma = ≤
period = ≥
l = ↑
k = ↓
j = ←
semicolon = →
bracketleft = ⇐
bracketright = ⇒
equal = ≠
backslash = ≈
slash = ⇔
apostrophe = ∧
minus = −
grave = ↯

[shift]

grave = ±
backslash = ~

# Backtick
[main]
grave = §

# Brightness key remap
volumeup = shift-alt-up
volumedown = shift-alt-down
